name: Update Notes Submodule

on:
  repository_dispatch:
    types: [notes-updated]

permissions:
  contents: write

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
          submodules: recursive

      - name: Update notes submodule to latest
        run: git submodule update --remote notes

      - name: Commit and push if submodule changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes
          if git diff --cached --quiet; then
            echo "Submodule already up to date, nothing to commit."
          else
            git commit -m "chore: update notes submodule to latest"
            git push
          fi
